<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>
    Ujjain Reels
  </title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{

      background:#000;

      color:white;

      overflow-x:hidden;

    }

    /* HEADER */

    .reels-header{

      width:92%;

      margin:auto;

      padding:40px 0;

      display:flex;

      justify-content:space-between;

      align-items:center;

      flex-wrap:wrap;

      gap:20px;

    }

    .header-left h1{

      font-size:58px;

      font-weight:900;

      background:
        linear-gradient(
          135deg,
          #ff0000,
          #ff7300
        );

      -webkit-background-clip:text;

      -webkit-text-fill-color:transparent;

      margin-bottom:10px;

    }

    .header-left p{

      color:#aaa;

      font-size:18px;

    }

    .back-btn{

      padding:15px 28px;

      border:none;

      border-radius:40px;

      background:
        linear-gradient(
          135deg,
          #ff0000,
          #ff5e00
        );

      color:white;

      font-weight:700;

      cursor:pointer;

      font-size:15px;

      transition:0.4s;

    }

    .back-btn:hover{

      transform:scale(1.05);

    }

    /* GRID */

    .reels-grid{

      width:92%;

      margin:auto;

      display:grid;

      grid-template-columns:
        repeat(4,1fr);

      gap:30px;

      padding-bottom:80px;

    }

    /* CARD */

    .reel-card{

      position:relative;

      height:520px;

      border-radius:32px;

      overflow:hidden;

      cursor:pointer;

      background:#111;

      transition:0.5s;

    }

    .reel-card:hover{

      transform:
        translateY(-10px)
        scale(1.02);

    }

    .reel-card video{

      width:100%;

      height:100%;

      object-fit:cover;

      pointer-events:none;

    }

    .reel-gradient{

      position:absolute;

      inset:0;

      background:
        linear-gradient(
          to top,
          rgba(0,0,0,0.95),
          rgba(0,0,0,0.1)
        );

      pointer-events:none;

    }

    /* PLAY BUTTON */

    .play-btn{

      position:absolute;

      top:50%;

      left:50%;

      transform:
        translate(-50%,-50%);

      width:90px;

      height:90px;

      border-radius:50%;

      display:flex;

      justify-content:center;

      align-items:center;

      font-size:34px;

      background:
        rgba(255,255,255,0.15);

      backdrop-filter:blur(10px);

      z-index:10;

      pointer-events:none;

      transition:0.4s;

    }

    .reel-content{

      position:absolute;

      left:24px;

      bottom:24px;

      z-index:10;

      pointer-events:none;

    }

    .reel-tag{

      display:inline-block;

      padding:8px 14px;

      border-radius:30px;

      background:
        rgba(255,255,255,0.12);

      margin-bottom:15px;

      font-size:12px;

      letter-spacing:1px;

    }

    .reel-content h2{

      font-size:24px;

      margin-bottom:8px;

    }

    .reel-content p{

      color:#ddd;

      font-size:14px;

    }

    /* FULLSCREEN PLAYER */

    .fullscreen-player{

      position:fixed;

      inset:0;

      background:black;

      z-index:9999;

      display:none;

      justify-content:center;

      align-items:center;

    }

    .fullscreen-player.active{

      display:flex;

    }

    .fullscreen-player video{

      width:100%;

      height:100%;

      object-fit:contain;

      background:black;

    }

    .close-btn{

      position:absolute;

      top:20px;

      right:20px;

      width:55px;

      height:55px;

      border-radius:50%;

      border:none;

      background:
        rgba(255,255,255,0.15);

      color:white;

      font-size:28px;

      cursor:pointer;

      z-index:10000;

      backdrop-filter:blur(10px);

    }

    /* MOBILE */

    @media(max-width:1200px){

      .reels-grid{

        grid-template-columns:
          repeat(2,1fr);

      }

    }

    @media(max-width:768px){

      .reels-grid{

        grid-template-columns:1fr;

      }

      .header-left h1{

        font-size:40px;

      }

    }

  </style>

</head>

<body>

  <!-- HEADER -->

  <div class="reels-header">

    <div class="header-left">

      <h1>
        Trending Reels
      </h1>

      <p>
        Watch breaking news,
        viral updates and live coverage
        from Ujjain Samachar.
      </p>

    </div>

    <button
      class="back-btn"
      onclick="goHome()"
    >

      Back To Home

    </button>

  </div>

  <!-- REELS GRID -->

  <div
    class="reels-grid"
    id="reelsViewer"
  ></div>

  <!-- FULLSCREEN PLAYER -->

  <div
    class="fullscreen-player"
    id="fullscreenPlayer"
  >

    <button
      class="close-btn"
      onclick="closeFullscreen()"
    >

      ✕

    </button>

    <video
      id="fullscreenVideo"
      controls
      autoplay
    ></video>

  </div>

  <script>

    async function loadFullReels(){

      const response = await fetch(
        "http://127.0.0.1:8000/reels"
      );

      const reels =
        await response.json();

      const container =
        document.getElementById(
          "reelsViewer"
        );

      container.innerHTML = "";

      reels.forEach(reel => {

        container.innerHTML += `

          <div
            class="reel-card"
            onclick="openFullscreen('${reel.video}')"
          >

            <video muted>

              <source src="${reel.video}">

            </video>

            <div class="reel-gradient"></div>

            <div class="play-btn">

              ▶

            </div>

            <div class="reel-content">

              <span class="reel-tag">

                TRENDING REEL

              </span>

              <h2>

                ${reel.title || "Ujjain Update"}

              </h2>

              <p>

                Ujjain Samachar • Live Coverage

              </p>

            </div>

          </div>

        `;

      });

    }

    loadFullReels();

    function openFullscreen(videoSrc){

      const player =
        document.getElementById(
          "fullscreenPlayer"
        );

      const video =
        document.getElementById(
          "fullscreenVideo"
        );

      video.src = videoSrc;

      player.classList.add("active");

      video.play();

    }

    function closeFullscreen(){

      const player =
        document.getElementById(
          "fullscreenPlayer"
        );

      const video =
        document.getElementById(
          "fullscreenVideo"
        );

      player.classList.remove("active");

      video.pause();

    }

    function goHome(){

      window.location.href =
        "home.html";

    }

  </script>

</body>

</html>
