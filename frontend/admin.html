<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Admin Panel - Ujjain Samachar</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      background:#f5f7fb;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
    }

    .admin-container{

      width:450px;

      background:white;

      padding:35px;

      border-radius:20px;

      box-shadow:0 5px 20px rgba(0,0,0,0.1);

    }

    h1{
      text-align:center;
      margin-bottom:30px;
      color:#d60000;
    }

    input,
    textarea{

      width:100%;

      padding:14px;

      margin-bottom:20px;

      border:1px solid #ccc;

      border-radius:10px;

      font-size:16px;
    }

    textarea{
      resize:none;
      height:130px;
    }

    button{

      width:100%;

      padding:15px;

      border:none;

      background:#d60000;

      color:white;

      border-radius:10px;

      font-size:18px;

      cursor:pointer;

      transition:0.3s;
    }

    button:hover{
      background:#ff1f1f;
    }

    .logout-btn{
      margin-top:15px;
      background:#222;
    }

    .logout-btn:hover{
      background:#444;
    }

  </style>

</head>
<body>

<script>

  const token =
    localStorage.getItem("token");

  if(!token){

    window.location.href =
      "login.html";

  }

</script>

<div class="admin-container">

  <h1>Upload News</h1>

  <form id="newsForm">

    <input
      type="text"
      id="title"
      placeholder="Enter News Title"
      required
    >

    <textarea
      id="description"
      placeholder="Enter News Description"
      required
    ></textarea>

    <input
      type="file"
      id="image"
      accept="image/*,video/*"
      required
    >

    <button type="submit">
      Upload News
    </button>

  </form>
  <hr style="margin:30px 0">

<h2 style="margin-bottom:15px;">
  Breaking News
</h2>

<input
  type="text"
  id="breakingInput"
  placeholder="Enter Breaking News"
>

<button onclick="updateBreakingNews()">
  Update Breaking News
</button>
<hr style="margin:40px 0">

<h2 style="margin-bottom:20px;">
  Add Team Member
</h2>

<form id="teamForm">

  <input
    type="text"
    id="teamName"
    placeholder="Enter Name"
    required
  >

  <input
    type="text"
    id="teamPosition"
    placeholder="Enter Position"
    required
  >

  <input
    type="text"
    id="teamContact"
    placeholder="Enter Contact"
    required
  >

  <input
    type="text"
    id="teamDob"
    placeholder="Enter DOB"
    required
  >

  <input
    type="text"
    id="teamAddress"
    placeholder="Enter Address"
    required
  >

  <textarea
    id="teamDescription"
    placeholder="Write Professional Description"
    required
  ></textarea>

  <input
    type="file"
    id="teamImage"
    accept="image/*"
    required
  >

  <button type="submit">
    Add Team Member
  </button>

</form>
<hr style="margin:40px 0">

<h2 style="margin-bottom:20px;">
  Team Members
</h2>

<div id="teamAdminContainer">

</div>
  <hr style="margin:30px 0">
<hr style="margin:40px 0">

<h2 style="margin-bottom:20px;">
  Upload Reel
</h2>

<form id="reelForm">

  <input
    type="text"
    id="reelTitle"
    placeholder="Enter Reel Title"
    required
  >

  <input
    type="file"
    id="reelVideo"
    accept="video/*"
    required
  >

  <button type="submit">
    Upload Reel
  </button>

</form>

<hr style="margin:40px 0">

<h2 style="margin-bottom:20px;">
  Uploaded Reels
</h2>

<div id="reelsAdminContainer">

</div>
  <h2 style="margin-bottom:20px;">
    Uploaded News
  </h2>

  <div id="adminNews"></div>

  <button
    class="logout-btn"
    onclick="logout()"
  >
    Logout
  </button>

</div>

<script>

  const form = document.getElementById("newsForm");

  let editId = null;

  form.addEventListener("submit", async (e) => {

    e.preventDefault();

    const formData = new FormData();

    formData.append(
      "title",
      document.getElementById("title").value
    );

    formData.append(
      "description",
      document.getElementById("description").value
    );

    formData.append(
      "media",
      document.getElementById("image").files[0]
    );

    let url =
      "https://ujjain-samachar.onrender.com/upload-news";

    let method = "POST";

    if(editId){

      url =
        `https://ujjain-samachar.onrender.com/update-news/${editId}`;

      method = "PUT";

    }

    const response = await fetch(
      url,
      {
        method: method,
        body: formData
      }
    );

    const data = await response.json();

    alert(data.message);

    form.reset();

    editId = null;

    loadAdminNews();

  });

  async function loadAdminNews(){

    const response = await fetch(
      "https://ujjain-samachar.onrender.com/news"
    );

    const newsData = await response.json();

    const container =
      document.getElementById("adminNews");

    container.innerHTML = "";

    newsData.forEach(news => {

      container.innerHTML += `

        <div style="
          background:#f1f1f1;
          padding:15px;
          border-radius:10px;
          margin-bottom:15px;
        ">

          ${
            news.type === "video"

            ?

            `
              <video
                controls
                style="
                  width:100%;
                  height:200px;
                  object-fit:cover;
                  border-radius:10px;
                  margin-bottom:10px;
                "
              >
                <source src="${news.media}">
              </video>
            `

            :

            `
              <img
                src="${news.media}"
                style="
                  width:100%;
                  height:200px;
                  object-fit:cover;
                  border-radius:10px;
                  margin-bottom:10px;
                "
              >
            `
          }

          <h3>${news.title}</h3>

          <p style="margin:10px 0;">
            ${news.description}
          </p>

          <small style="
            color:gray;
            display:block;
            margin-bottom:15px;
          ">
            ${news.time || "Just Now"}
          </small>

          <button
            onclick="deleteNews(${news.id})"
            style="
              background:red;
              color:white;
              border:none;
              padding:10px 15px;
              border-radius:8px;
              cursor:pointer;
            "
          >
            Delete
          </button>

          <button
            onclick="editNews(
              ${news.id},
              '${news.title}',
              '${news.description}'
            )"
            style="
              background:#222;
              color:white;
              border:none;
              padding:10px 15px;
              border-radius:8px;
              cursor:pointer;
              margin-left:10px;
            "
          >
            Edit
          </button>

        </div>

      `;

    });

  }

  async function deleteNews(id){

    await fetch(
      `https://ujjain-samachar.onrender.com/delete-news/${id}`,
      {
        method:"DELETE"
      }
    );

    loadAdminNews();

  }

  function editNews(id, title, description){

    editId = id;

    document.getElementById("title").value =
      title;

    document.getElementById("description").value =
      description;

  }

  function logout(){

    localStorage.removeItem("token");

    window.location.href =
      "login.html";

  }

  loadAdminNews();

async function updateBreakingNews(){

  const text =
    document.getElementById(
      "breakingInput"
    ).value;

  await fetch(
    "https://ujjain-samachar.onrender.com/breaking-news",
    {
      method:"PUT",

      headers:{
        "Content-Type":"application/json"
      },

      body: JSON.stringify({
        text
      })
    }
  );

  alert("Breaking News Updated");

}
const teamForm =
  document.getElementById("teamForm");

teamForm.addEventListener(
  "submit",
  async (e) => {

    e.preventDefault();

    const formData = new FormData();

    formData.append(
      "name",
      document.getElementById(
        "teamName"
      ).value
    );

    formData.append(
      "position",
      document.getElementById(
        "teamPosition"
      ).value
    );

    formData.append(
      "contact",
      document.getElementById(
        "teamContact"
      ).value
    );

    formData.append(
      "dob",
      document.getElementById(
        "teamDob"
      ).value
    );

    formData.append(
      "address",
      document.getElementById(
        "teamAddress"
      ).value
    );

    formData.append(
      "description",
      document.getElementById(
        "teamDescription"
      ).value
    );

    formData.append(
      "image",
      document.getElementById(
        "teamImage"
      ).files[0]
    );

    const response = await fetch(
      "https://ujjain-samachar.onrender.com/add-team",
      {
        method:"POST",
        body:formData
      }
    );

    const data = await response.json();

    alert(data.message);

    teamForm.reset();

  }
);
async function loadAdminTeam(){

  const response = await fetch(
    "https://ujjain-samachar.onrender.com/team"
  );

  const teamData = await response.json();

  const container =
    document.getElementById(
      "teamAdminContainer"
    );

  container.innerHTML = "";

  teamData.forEach(member => {

    container.innerHTML += `

      <div style="
        background:#f1f1f1;
        padding:20px;
        border-radius:15px;
        margin-bottom:20px;
      ">

        <img
          src="${member.image}"
          style="
            width:100%;
            height:220px;
            object-fit:cover;
            border-radius:12px;
            margin-bottom:15px;
          "
        >

        <h3>
          ${member.name}
        </h3>

        <p>
          ${member.position}
        </p>

        <button
          onclick="deleteTeam(${member.id})"
          style="
            margin-top:15px;
            background:red;
            color:white;
            border:none;
            padding:10px 15px;
            border-radius:8px;
            cursor:pointer;
          "
        >
          Delete
        </button>

      </div>

    `;

  });

}

async function deleteTeam(id){

  await fetch(
    `https://ujjain-samachar.onrender.com/delete-team/${id}`,
    {
      method:"DELETE"
    }
  );

  loadAdminTeam();

}

loadAdminTeam();
const reelForm =
  document.getElementById("reelForm");

reelForm.addEventListener(
  "submit",
  async (e) => {

    e.preventDefault();

    const formData = new FormData();

    formData.append(
      "title",
      document.getElementById(
        "reelTitle"
      ).value
    );

    formData.append(
      "video",
      document.getElementById(
        "reelVideo"
      ).files[0]
    );

    const response = await fetch(
      "https://ujjain-samachar.onrender.com/upload-reel",
      {
        method:"POST",
        body:formData
      }
    );

    const data = await response.json();

    alert(data.message);

    reelForm.reset();

    loadAdminReels();

  }
);

async function loadAdminReels(){

  const response = await fetch(
    "https://ujjain-samachar.onrender.com/reels"
  );

  const reels = await response.json();

  const container =
    document.getElementById(
      "reelsAdminContainer"
    );

  container.innerHTML = "";

  reels.forEach(reel => {

    container.innerHTML += `

      <div style="
        background:#f1f1f1;
        padding:20px;
        border-radius:20px;
        margin-bottom:20px;
      ">

        <video
          controls
          style="
            width:100%;
            border-radius:15px;
            margin-bottom:15px;
          "
        >
          <source src="${reel.video}">
        </video>

        <h3>
          ${reel.title}
        </h3>

        <button
          onclick="deleteReel(${reel.id})"
          style="
            margin-top:15px;
            background:red;
            color:white;
            border:none;
            padding:10px 15px;
            border-radius:8px;
            cursor:pointer;
          "
        >
          Delete
        </button>

      </div>

    `;

  });

}

async function deleteReel(id){

  await fetch(
    `https://ujjain-samachar.onrender.com/delete-reel/${id}`,
    {
      method:"DELETE"
    }
  );

  loadAdminReels();

}

loadAdminReels();
</script>

</body>
</html>
