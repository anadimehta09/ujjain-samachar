<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Admin Login</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial;
    }

    body{
      height:100vh;

      display:flex;
      justify-content:center;
      align-items:center;

      background:#f5f7fb;
    }

    .login-box{

      width:400px;

      background:white;

      padding:40px;

      border-radius:20px;

      box-shadow:0 5px 20px rgba(0,0,0,0.1);

    }

    h1{
      text-align:center;
      margin-bottom:30px;
      color:#d60000;
    }

    input{

      width:100%;

      padding:14px;

      margin-bottom:20px;

      border:1px solid #ccc;

      border-radius:10px;
    }

    button{

      width:100%;

      padding:14px;

      border:none;

      background:#d60000;

      color:white;

      border-radius:10px;

      cursor:pointer;

      font-size:17px;
    }

  </style>

</head>
<body>

  <div class="login-box">

    <h1>Admin Login</h1>

    <input
      type="text"
      id="username"
      placeholder="Enter Username"
    >

    <input
      type="password"
      id="password"
      placeholder="Enter Password"
    >

    <button onclick="login()">
      Login
    </button>

  </div>

  <script>

    async function login(){

      const username =
        document.getElementById("username").value;

      const password =
        document.getElementById("password").value;

      const response = await fetch(
  "https://ujjain-samachar.onrender.com/login",
        {
          method:"POST",

          headers:{
            "Content-Type":"application/json"
          },

          body: JSON.stringify({
            username,
            password
          })
        }
      );

      const data = await response.json();

      if(data.token){

        localStorage.setItem(
          "token",
          data.token
        );

        window.location.href =
          "admin.html";

      }

      else{

        alert("Invalid Credentials");

      }

    }

  </script>

</body>
</html>
